name: Release EyeFlow

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-eyeflow
  cancel-in-progress: false

jobs:
  release:
    name: Squash dev to main and publish release
    runs-on: windows-latest
    if: github.event.deleted == false
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_CREATED: ${{ github.event.created }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Validate release tag
        id: validate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Assert-LastExit {
              param([Parameter(Mandatory = $true)][string]$Message)
              if ($LASTEXITCODE -ne 0) {
                  throw $Message
              }
          }

          $tagName = $env:TAG_NAME
          if ($env:TAG_CREATED -ne "true") {
              throw "Release tag '$tagName' must be newly created. Tag updates are rejected."
          }
          if ($tagName -notmatch '^v\d+\.\d+\.\d+$') {
              throw "Invalid release tag '$tagName'. Expected vX.X.X, for example v0.3.1."
          }

          git fetch --prune origin `
              "+refs/heads/main:refs/remotes/origin/main" `
              "+refs/heads/dev:refs/remotes/origin/dev" `
              "+refs/tags/$tagName:refs/tags/$tagName"
          Assert-LastExit "Could not fetch origin/main, origin/dev, and '$tagName'."

          $tagRefSha = (git rev-parse "refs/tags/$tagName").Trim()
          Assert-LastExit "Could not resolve tag ref '$tagName'."
          $tagCommitSha = (git rev-parse "refs/tags/$tagName^{commit}").Trim()
          Assert-LastExit "Could not resolve tag commit '$tagName'."
          $devSha = (git rev-parse "refs/remotes/origin/dev^{commit}").Trim()
          Assert-LastExit "Could not resolve origin/dev."
          $mainSha = (git rev-parse "refs/remotes/origin/main^{commit}").Trim()
          Assert-LastExit "Could not resolve origin/main."

          if ($tagCommitSha -ne $devSha) {
              throw "Tag '$tagName' points to $tagCommitSha, but origin/dev is $devSha. Create the release tag from the current dev HEAD."
          }

          gh release view $tagName *> $null
          if ($LASTEXITCODE -eq 0) {
              throw "Release '$tagName' already exists."
          }
          if ($LASTEXITCODE -ne 1) {
              throw "Could not check release availability for '$tagName'."
          }

          $lastReleaseBody = [string]::Join("`n", (git log origin/main --extended-regexp --grep '^Version v[0-9]+\.[0-9]+\.[0-9]+$' -n 1 --format=%B))
          $previousDevSha = ""
          if ($lastReleaseBody -match '(?m)^Dev-Head:\s*([0-9a-f]{40})\s*$') {
              $candidatePreviousDevSha = $Matches[1]
              git merge-base --is-ancestor $candidatePreviousDevSha $tagCommitSha
              if ($LASTEXITCODE -eq 0) {
                  $previousDevSha = $candidatePreviousDevSha
              }
          }

          if (-not $previousDevSha) {
              $previousDevSha = (git merge-base origin/main $tagCommitSha).Trim()
              Assert-LastExit "Could not find a shared history point between origin/main and '$tagName'."
          }

          $releaseNotes = [string]::Join("`n", (git log --reverse --format='- %s' "$previousDevSha..$tagCommitSha"))
          if ([string]::IsNullOrWhiteSpace($releaseNotes)) {
              $releaseNotes = "- No commit messages found since the previous release marker."
          }

          $releaseNotesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          $commitMessagePath = Join-Path $env:RUNNER_TEMP "release-commit-message.txt"
          Set-Content -LiteralPath $releaseNotesPath -Value $releaseNotes -Encoding UTF8

          $commitMessage = @(
              "Version $tagName",
              "",
              "Release changes:",
              "",
              $releaseNotes,
              "",
              "Dev-Head: $tagCommitSha"
          ) -join "`n"
          Set-Content -LiteralPath $commitMessagePath -Value $commitMessage -Encoding UTF8

          "version=$($tagName.Substring(1))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding UTF8
          "tag_ref_sha=$tagRefSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding UTF8
          "tag_commit_sha=$tagCommitSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding UTF8
          "main_sha=$mainSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding UTF8
          "release_notes_path=$releaseNotesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding UTF8
          "commit_message_path=$commitMessagePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding UTF8

      - name: Configure Git author
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "gha[bot]@users.noreply.github.com"

      - name: Prepare squash release commit
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.validate.outputs.version }}
          TAG_COMMIT_SHA: ${{ steps.validate.outputs.tag_commit_sha }}
        run: |
          $ErrorActionPreference = "Stop"

          function Assert-LastExit {
              param([Parameter(Mandatory = $true)][string]$Message)
              if ($LASTEXITCODE -ne 0) {
                  throw $Message
              }
          }

          git checkout -B release-main origin/main
          Assert-LastExit "Could not check out origin/main."

          git merge --squash --no-commit $env:TAG_COMMIT_SHA
          Assert-LastExit "Squash merge from dev failed. Resolve the conflict on dev/main, then recreate the release tag."

          $pyprojectPath = "pyproject.toml"
          $pyproject = Get-Content -LiteralPath $pyprojectPath -Raw -Encoding UTF8
          $versionLine = [regex]::new('(?m)^version\s*=\s*"[^"]+"\s*$')
          if (-not $versionLine.IsMatch($pyproject)) {
              throw "Could not find [project].version in pyproject.toml."
          }

          $pyproject = $versionLine.Replace($pyproject, "version = `"$env:RELEASE_VERSION`"", 1)
          Set-Content -LiteralPath $pyprojectPath -Value $pyproject -Encoding UTF8 -NoNewline

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        shell: pwsh
        run: uv sync

      - name: Commit squash release locally
        id: commit
        shell: pwsh
        env:
          COMMIT_MESSAGE_PATH: ${{ steps.validate.outputs.commit_message_path }}
        run: |
          $ErrorActionPreference = "Stop"

          function Assert-LastExit {
              param([Parameter(Mandatory = $true)][string]$Message)
              if ($LASTEXITCODE -ne 0) {
                  throw $Message
              }
          }

          git add -A
          Assert-LastExit "Could not stage release changes."

          $stagedChanges = git diff --cached --name-only
          if ([string]::IsNullOrWhiteSpace(([string]::Join("`n", $stagedChanges)))) {
              throw "No release changes were staged. Refusing to create an empty release commit."
          }

          git commit -F $env:COMMIT_MESSAGE_PATH
          Assert-LastExit "Could not create local release commit."

          $releaseCommit = (git rev-parse HEAD).Trim()
          Assert-LastExit "Could not resolve local release commit."
          "release_commit=$releaseCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding UTF8

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        id: build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          .\build_installer.ps1

          $installer = Get-ChildItem -LiteralPath "dist\installer" -Filter "*-Setup-*.exe" |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
          if (-not $installer) {
              throw "Build finished, but no installer was found in dist\installer."
          }

          "installer_path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding UTF8

      - name: Push main, move tag, and publish release
        shell: pwsh
        env:
          MAIN_SHA: ${{ steps.validate.outputs.main_sha }}
          TAG_REF_SHA: ${{ steps.validate.outputs.tag_ref_sha }}
          RELEASE_COMMIT: ${{ steps.commit.outputs.release_commit }}
          INSTALLER_PATH: ${{ steps.build.outputs.installer_path }}
          RELEASE_NOTES_PATH: ${{ steps.validate.outputs.release_notes_path }}
        run: |
          $ErrorActionPreference = "Stop"

          function Assert-LastExit {
              param([Parameter(Mandatory = $true)][string]$Message)
              if ($LASTEXITCODE -ne 0) {
                  throw $Message
              }
          }

          $currentMain = (git ls-remote origin refs/heads/main).Split()[0]
          if ($currentMain -ne $env:MAIN_SHA) {
              throw "origin/main moved from $env:MAIN_SHA to $currentMain while this release was building. Recreate the tag and try again."
          }

          git tag -f $env:TAG_NAME $env:RELEASE_COMMIT
          Assert-LastExit "Could not retarget local tag '$env:TAG_NAME' to the release commit."

          git push --atomic origin `
              HEAD:refs/heads/main `
              "+refs/tags/$env:TAG_NAME:refs/tags/$env:TAG_NAME" `
              "--force-with-lease=refs/tags/$env:TAG_NAME`:$env:TAG_REF_SHA"
          Assert-LastExit "Could not push the release commit to main and move tag '$env:TAG_NAME'."

          New-Item -ItemType File -Path ".release-remote-mutated" -Force | Out-Null

          gh release create $env:TAG_NAME $env:INSTALLER_PATH `
              --title "Eyeflow" `
              --notes-file $env:RELEASE_NOTES_PATH `
              --verify-tag
          Assert-LastExit "Could not publish GitHub release '$env:TAG_NAME'."

      - name: Reject failed release tag
        if: failure()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"

          if (Test-Path -LiteralPath ".release-remote-mutated") {
              Write-Warning "Remote main/tag was already updated before the failure. Leaving '$env:TAG_NAME' in place to avoid partial rollback."
              exit 0
          }

          Write-Warning "Release failed before publishing. Deleting rejected tag '$env:TAG_NAME' from origin."
          git push origin ":refs/tags/$env:TAG_NAME"
